name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create plugin ZIP
        run: |
          mkdir -p dist/wp-citas
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='.githooks' --exclude='.claude' \
            --exclude='dist' --exclude='vendor' \
            --exclude='composer.json' --exclude='composer.lock' \
            --exclude='phpcs.xml' --exclude='.gitignore' \
            . dist/wp-citas/
          cd dist
          zip -r "../wp-citas-${{ github.ref_name }}.zip" wp-citas/

      - name: Deploy a producción
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            mirror --reverse --delete --verbose dist/wp-citas/ web/wp-content/plugins/wp-citas/;
            quit
          " sftp://$SFTP_HOST

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "wp-citas-${{ github.ref_name }}.zip"
