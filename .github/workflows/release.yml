name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create plugin ZIP
        run: |
          mkdir -p dist/wp-citas
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' --exclude='composer.json' --exclude='composer.lock' --exclude='phpcs.xml' --exclude='vendor' . dist/wp-citas/
          cd dist
          zip -r "../wp-citas-${{ github.ref_name }}.zip" wp-citas/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "wp-citas-${{ github.ref_name }}.zip"
