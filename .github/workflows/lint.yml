name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Instalar dependencias
        run: composer install --no-progress --no-interaction

      - name: Lint
        run: composer lint
